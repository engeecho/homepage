<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f14">
<title>Home — Chris Ngo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0c11;
    --bg-card: rgba(255,255,255,0.035);
    --bg-card-hover: rgba(255,255,255,0.065);
    --bg-glass: rgba(255,255,255,0.05);
    --text: #ede9f2;
    --text-soft: #a09bb2;
    --text-muted: #58536a;
    --accent: #7468cc;
    --accent-soft: #a99fe0;
    --accent-warm: #e8a265;
    --accent-green: #5ed494;
    --accent-rose: #e86880;
    --border: rgba(255,255,255,0.07);
    --border-light: rgba(255,255,255,0.035);
    --shadow: 0 2px 8px rgba(0,0,0,0.28), 0 8px 32px rgba(0,0,0,0.2);
    --shadow-hover: 0 4px 16px rgba(116,104,204,0.18), 0 12px 40px rgba(0,0,0,0.25);
    --radius: 20px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Outfit', -apple-system, sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%; /* Prevent iOS font inflation */
    position: relative;
    overflow-x: hidden;
  }

  /* Gradient orbs background */
  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }

  body::before {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #7468cc 0%, transparent 70%);
    top: -200px;
    right: -100px;
  }

  body::after {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #e8a265 0%, transparent 70%);
    bottom: -150px;
    left: -100px;
  }

  .page {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 32px 64px;
    padding-top: max(48px, env(safe-area-inset-top) + 24px);
    padding-bottom: max(64px, env(safe-area-inset-bottom) + 24px);
    padding-left: max(32px, env(safe-area-inset-left) + 16px);
    padding-right: max(32px, env(safe-area-inset-right) + 16px);
    position: relative;
    z-index: 1;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.6s ease both;
  }

  .header-left .date {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    color: var(--accent-soft);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1.1;
    color: var(--text);
  }

  .header-left h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right .clock {
    font-family: var(--font-mono);
    font-size: 32px;
    font-weight: 400;
    color: var(--text-soft);
    line-height: 1;
  }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }

  .span-full { grid-column: 1 / -1; }
  .span-2 { grid-column: span 2; }

  /* ─── Cards ─── */
  .card {
    background: var(--bg-card);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
    animation: fadeUp 0.6s ease both;
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
    border-color: rgba(124,108,240,0.15);
  }

  .card-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-label a {
    color: var(--accent-soft);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .card-label a:hover { color: var(--accent); }

  /* ─── Weather ─── */
  .weather-current {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .weather-icon { font-size: 52px; line-height: 1; }

  .weather-temp {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 400;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .weather-desc {
    font-size: 14px;
    color: var(--text-soft);
    margin-top: 4px;
  }

  .weather-details {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-family: var(--font-mono);
    font-weight: 300;
  }

  .weather-hourly {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 20px;
    border-top: 1px solid var(--border-light);
    padding-top: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    -webkit-overflow-scrolling: touch;
  }

  .weather-hourly::-webkit-scrollbar { height: 4px; }
  .weather-hourly::-webkit-scrollbar-track { background: transparent; }
  .weather-hourly::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .hour-item {
    min-width: 68px;
    text-align: center;
    padding: 8px 6px;
    flex-shrink: 0;
    border-right: 1px solid var(--border-light);
  }

  .hour-item:last-child { border-right: none; }

  .hour-item .time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .hour-item .h-icon { font-size: 20px; margin-bottom: 4px; }

  .hour-item .h-temp {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .hour-item .h-feels {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .hour-item .h-pop {
    font-size: 9px;
    color: var(--accent-soft);
    margin-top: 3px;
  }

  .hour-item .day-label {
    font-size: 9px;
    color: var(--accent-warm);
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .weather-forecast {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border-light);
    padding-top: 20px;
  }

  .forecast-day {
    flex: 1;
    text-align: center;
    padding: 0 12px;
    border-right: 1px solid var(--border-light);
  }

  .forecast-day:last-child { border-right: none; }

  .forecast-day .f-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .forecast-day .f-icon { font-size: 26px; margin-bottom: 6px; }

  .forecast-day .f-temps {
    font-size: 13px;
    color: var(--text-soft);
  }

  .forecast-day .f-temps strong {
    color: var(--text);
    font-weight: 500;
  }

  .forecast-day .f-note {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .forecast-day .f-precip {
    font-size: 10px;
    color: var(--accent-soft);
    margin-top: 3px;
  }

  /* ─── Quick Links ─── */
  .links-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .quick-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 18px 8px;
    border-radius: 12px;
    border: 1px solid var(--border-light);
    text-decoration: none;
    transition: all 0.25s ease;
    cursor: pointer;
    background: transparent;
  }

  .quick-link:hover {
    background: var(--bg-card-hover);
    border-color: var(--border);
    transform: translateY(-2px);
  }

  .quick-link .link-icon { font-size: 24px; }

  .quick-link .link-name {
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 400;
  }

  /* ─── App Cards ─── */
  .app-card {
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: box-shadow 0.3s, transform 0.25s;
  }

  .app-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-color: rgba(124,108,240,0.15);
  }

  .app-card-inner {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 4px;
  }

  .app-icon {
    font-size: 36px;
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--border-light);
    border-radius: 14px;
  }

  .app-info h3 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 400;
    margin-bottom: 2px;
    color: var(--text);
  }

  .app-info p {
    font-size: 13px;
    color: var(--text-muted);
  }

  .app-arrow {
    margin-left: auto;
    font-size: 20px;
    color: var(--text-muted);
    transition: color 0.2s, transform 0.2s;
  }

  .app-card:hover .app-arrow {
    color: var(--accent-soft);
    transform: translateX(4px);
  }

  /* ─── Embeds ─── */
  .embed-frame {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #fff;
  }

  .embed-frame iframe {
    width: 100%;
    height: 620px;
    border: none;
    display: block;
  }

  /* ─── Sunrise / Sunset ─── */
  .sun-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .sun-item {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 140px;
    padding: 16px 18px;
    background: linear-gradient(135deg, rgba(124,108,240,0.06) 0%, rgba(240,168,112,0.06) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: border-color 0.3s;
  }

  .sun-item:hover { border-color: rgba(124,108,240,0.2); }

  .sun-icon { font-size: 28px; }

  .sun-info { display: flex; flex-direction: column; gap: 2px; }

  .sun-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .sun-time {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-warm);
  }

  /* ─── Crypto ─── */
  .crypto-row {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    -webkit-overflow-scrolling: touch;
  }

  .crypto-row::-webkit-scrollbar { height: 4px; }
  .crypto-row::-webkit-scrollbar-track { background: transparent; }
  .crypto-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .crypto-coin {
    min-width: 140px;
    flex-shrink: 0;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(124,108,240,0.03);
    transition: border-color 0.3s;
  }

  .crypto-coin:hover { border-color: rgba(124,108,240,0.2); }

  .crypto-coin-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .crypto-coin-header img {
    width: 22px;
    height: 22px;
    border-radius: 50%;
  }

  .crypto-coin-header .coin-symbol {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-transform: uppercase;
  }

  .crypto-price {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .crypto-change {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
  }

  .crypto-change.up { color: var(--accent-green); }
  .crypto-change.down { color: var(--accent-rose); }

  /* ─── NBA Scores ─── */
  .nba-section-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-light);
  }

  .nba-scores-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    -webkit-overflow-scrolling: touch;
  }

  .nba-scores-row::-webkit-scrollbar { height: 4px; }
  .nba-scores-row::-webkit-scrollbar-track { background: transparent; }
  .nba-scores-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .nba-game {
    min-width: 130px;
    flex-shrink: 0;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(255,255,255,0.02);
    transition: border-color 0.3s;
  }

  .nba-game:hover { border-color: rgba(124,108,240,0.2); }

  .nba-game.upcoming { background: rgba(124,108,240,0.03); }

  .nba-status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .nba-game.final .nba-status { color: var(--accent-green); }

  .nba-team {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .nba-abbr {
    font-weight: 500;
    font-size: 14px;
    color: var(--text-soft);
  }

  .nba-score {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text-muted);
  }

  .nba-score.win { color: var(--text); }

  .nba-spread {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .nba-spread.fav { color: var(--accent-soft); font-weight: 700; }

  .nba-total {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 2px;
    padding-top: 4px;
    border-top: 1px solid var(--border-light);
  }

  /* ─── Quote ─── */
  .quote-text {
    font-family: var(--font-display);
    font-size: 18px;
    font-style: italic;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .quote-author {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── Instagram Strip ─── */
  .insta-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }

  .insta-photo {
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background: var(--border-light);
    cursor: pointer;
  }

  .insta-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .insta-photo:hover img { transform: scale(1.06); }

  .insta-photo-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,12,17,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(2px);
  }

  .insta-photo:hover .insta-photo-overlay { opacity: 1; }

  .insta-photo-overlay span {
    font-size: 20px;
    color: #fff;
  }

  .insta-placeholder {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }

  .insta-placeholder-tile {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--border-light);
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0.4;
  }

  .insta-setup {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    background: rgba(116,104,204,0.07);
    border: 1px solid rgba(116,104,204,0.15);
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.6;
  }

  .insta-setup a { color: var(--accent-soft); text-decoration: none; }
  .insta-setup a:hover { color: var(--accent); }
  .insta-setup code {
    font-family: var(--font-mono);
    font-size: 11px;
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--accent-warm);
  }

  /* Instagram profile row */
  .insta-profile {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-light);
  }

  .insta-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }

  .insta-meta { display: flex; flex-direction: column; gap: 3px; }

  .insta-followers {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-soft);
    letter-spacing: 0.5px;
  }

  .insta-bio {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Reel badge */
  .insta-reel-badge {
    position: absolute;
    top: 7px;
    right: 8px;
    font-size: 11px;
    color: #fff;
    background: rgba(0,0,0,0.55);
    padding: 2px 6px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }

  @media (max-width: 768px) {
    /* Instagram — show all 6 in a 3×2 grid */
    .insta-grid, .insta-placeholder { grid-template-columns: repeat(3, 1fr); }
    .insta-photo, .insta-placeholder-tile { display: block !important; }
    .insta-profile { gap: 12px; }
    .insta-avatar { width: 42px; height: 42px; }
    .insta-followers { font-size: 12px; }
    .insta-bio { font-size: 11px; }
  }

  /* ─── Real Estate Shoots ─── */
  .shoot-list { display: flex; flex-direction: column; gap: 2px; }

  .shoot-week-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 18px 4px 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .shoot-week-label:first-child { padding-top: 4px; }
  .shoot-week-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }

  .shoot-item {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 0 18px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: background 0.2s, border-color 0.2s;
  }
  .shoot-item:hover {
    background: rgba(255,255,255,0.025);
    border-color: var(--border-light);
  }
  .shoot-item.shoot-today {
    background: rgba(232,162,101,0.04);
    border-color: rgba(232,162,101,0.18);
  }

  .shoot-date {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .shoot-date-top {
    font-family: var(--font-mono);

    font-weight: 700;

  }
  .shoot-item.shoot-today .shoot-date-top { color: var(--accent-warm); }
  .shoot-date-dow {
    font-family: var(--font-mono);

  }
  .shoot-today-tag {
    display: inline-block;
    font-family: var(--font-mono);

  .shoot-info { min-width: 0; }
  .shoot-title {

  .shoot-meta {

    font-size: 14px;
    text-decoration: none;
    opacity: 0.35;
    transition: opacity 0.2s;

  .shoot-map-btn:hover { opacity: 0.9; }

  @media (max-width: 640px) {
    .shoot-item { grid-template-columns: 64px 1fr auto; gap: 0 10px; padding: 9px 8px; }

  @media (max-width: 480px) {
    /* Shoots — hide location, just title + time + drive */
    .shoot-loc-text { display: none; }

    .shoot-week-label { font-size: 8px; letter-spacing: 1.5px; }
  }

  /* ─── Animations ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .delay-1 { animation-delay: 0.08s; }
  .delay-2 { animation-delay: 0.16s; }
  .delay-3 { animation-delay: 0.24s; }
  .delay-4 { animation-delay: 0.32s; }
  .delay-5 { animation-delay: 0.40s; }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    body::before {
      width: 300px; height: 300px;
      top: -100px; right: -50px;

    .page { padding: 24px 16px 40px;

    .card { padding: 18px; border-radius: 16px; }

    /* Weather — stack everything */

    /* Hourly — wrap into grid instead of scroll */

    /* Sun card — 2x2 grid */

    /* Shoots — tighten on 768px */

    /* Larger tap targets for map links */

  @media (max-width: 390px) {
    .page { padding: 20px 14px 36px; }

<body>

<div class="page">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="date" id="date-display"></div>
      <h1 id="greeting"></h1>
    </div>
    <div class="header-right">
      <div class="clock" id="clock-display"></div>
    </div>
  </header>

  <div class="grid">

    <!-- Weather -->
    <div class="card span-full delay-1" id="weather-card">
      <div class="card-label">
        St. Adolphe Weather
        <a href="https://www.theweathernetwork.com/en/city/ca/manitoba/st-adolphe/hourly" target="_blank">Full forecast ↗</a>
      </div>
      <div class="weather-current" id="weather-current">
        <div style="color: var(--text-muted); font-size: 14px;">Loading weather...</div>
      </div>
    </div>

    <!-- Sunrise / Sunset -->
    <div class="card span-full delay-2" id="sun-card">
      <div class="card-label">Sunrise & Sunset</div>
      <div id="sun-times" class="sun-row" style="color: var(--text-muted); font-size: 14px;">Loading...</div>
    </div>

    <!-- Upcoming Shoots -->
    <div class="card span-full delay-3" id="calendar-card">
      <div class="card-label">
        Upcoming Shoots
        <a href="https://calendar.google.com/calendar/r" target="_blank">Google Calendar ↗</a>
      </div>
      <div id="calendar-content" style="color:var(--text-muted);font-size:14px;">Loading shoots...</div>
    </div>

    <!-- NBA Scores -->
    <div class="card span-2 delay-4" id="nba-card">
      <div class="card-label">
        NBA Scores
        <a href="https://www.espn.com/nba/scoreboard" target="_blank">ESPN ↗</a>
      </div>
      <div id="nba-scores" style="color: var(--text-muted); font-size: 14px;">Loading scores...</div>
    </div>

    <!-- Crypto -->
    <div class="card delay-5" id="crypto-card">
      <div class="card-label">
        Crypto
        <a href="https://www.coingecko.com/" target="_blank">CoinGecko ↗</a>
      </div>
      <div id="crypto-prices" class="crypto-row" style="color: var(--text-muted); font-size: 14px;">Loading prices...</div>
    </div>

    <!-- Instagram -->
    <div class="card span-full delay-6" id="instagram-card">
      <div class="card-label">
        Recent Shots
        <a href="https://www.instagram.com/ngophotos__/" target="_blank">@ngophotos__ ↗</a>
      </div>
      <div id="instagram-content"></div>
    </div>

    <!-- To-Do -->
    <div class="card span-full delay-7">
      <div class="card-label">
        To-Do
        <a href="https://app.todoist.com/app/project/To-Do-List-6g6VfPcjjjqJG8XG" target="_blank">Open Todoist ↗</a>
      </div>
      <div class="embed-frame">
        <iframe src="https://app.todoist.com/app/project/To-Do-List-6g6VfPcjjjqJG8XG" title="Todoist" loading="lazy"></iframe>
      </div>

  </div>
</div>

<script>
  // ─── Clock & Greeting ───
  const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function updateTime() {
    const now = new Date();
    const h = now.getHours();
    let h12 = h % 12 || 12;
    const ampm = h >= 12 ? 'PM' : 'AM';
    const m = now.getMinutes().toString().padStart(2, '0');

    document.getElementById('clock-display').textContent = `${h12}:${m} ${ampm}`;
    document.getElementById('date-display').textContent = `${WEEKDAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

    let greeting = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').innerHTML = `${greeting}, <em>Chris</em>`;
  }

  updateTime();
  setInterval(updateTime, 30000);

  // ─── Weather ───
  async function loadWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.6753&longitude=-97.1114&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,cloud_cover&hourly=temperature_2m,weather_code,apparent_temperature,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,sunrise,sunset&timezone=America/Winnipeg&forecast_days=4');
      const data = await res.json();

      const c = data.current;
      const h = data.hourly;
      const d = data.daily;

      function wxIcon(code, isNight) {
        if (code <= 1) return isNight ? '🌙' : '☀️';
        if (code <= 3) return isNight ? '🌙' : '⛅';
        if (code <= 48) return '☁️';
        if (code <= 57) return '🌧️';
        if (code <= 67) return '🌧️';
        if (code <= 77) return '🌨️';
        if (code <= 82) return '🌦️';
        if (code <= 86) return '❄️';
        if (code <= 99) return '⛈️';
        return '🌤️';
      }

      function wxLabel(code) {
        if (code <= 1) return 'Clear';
        if (code <= 3) return 'Partly cloudy';
        if (code <= 48) return 'Overcast';
        if (code <= 57) return 'Drizzle';
        if (code <= 67) return 'Rain';
        if (code <= 77) return 'Snow';
        if (code <= 82) return 'Showers';
        if (code <= 86) return 'Snow showers';
        if (code <= 99) return 'Thunderstorm';
        return 'Fair';
      }

      // Sunrise / Sunset
      function formatSunTime(iso) {
        const dt = new Date(iso);
        let hr = dt.getHours();
        const min = dt.getMinutes().toString().padStart(2, '0');
        const ampm = hr >= 12 ? 'PM' : 'AM';
        hr = hr % 12 || 12;
        return `${hr}:${min} ${ampm}`;
      }

      const sunrise = d.sunrise ? formatSunTime(d.sunrise[0]) : '--';
      const sunset = d.sunset ? formatSunTime(d.sunset[0]) : '--';

      // Golden hour is roughly 1hr before sunset
      const sunsetDt = d.sunset ? new Date(d.sunset[0]) : null;
      let goldenHour = '';
      if (sunsetDt) {
        const gh = new Date(sunsetDt.getTime() - 60 * 60 * 1000);
        goldenHour = formatSunTime(gh.toISOString());
      }

      // Current
      const currentHTML = `
        <div class="weather-current">
          <span class="weather-icon">${wxIcon(c.weather_code, false)}</span>
          <div>
            <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
            <div class="weather-desc">Feels like ${Math.round(c.apparent_temperature)}° · ${wxLabel(c.weather_code)}</div>
          </div>
        </div>
        <div class="weather-details">
          <span>💨 ${c.wind_speed_10m} km/h</span>
          <span>💧 ${c.relative_humidity_2m}%</span>
          <span>☁️ ${c.cloud_cover}%</span>
        </div>
      `;

      // Hourly — next 18 hours
      const now = new Date();
      const currentHourIndex = h.time.findIndex(t => new Date(t) >= now);
      const startIdx = Math.max(0, currentHourIndex);
      const hourlyItems = h.time.slice(startIdx, startIdx + 18).map((t, i) => {
        const idx = startIdx + i;
        const dt = new Date(t);
        const hr = dt.getHours();
        const isNight = hr >= 20 || hr < 7;
        const timeStr = hr === 0 ? '12AM' : hr < 12 ? `${hr}AM` : hr === 12 ? '12PM' : `${hr - 12}PM`;
        const dayLabel = (hr === 0) ? WEEKDAYS[dt.getDay()].slice(0, 3) : '';
        const pop = h.precipitation_probability?.[idx] || 0;

        return `
          <div class="hour-item">
            ${dayLabel ? `<div class="day-label">${dayLabel}</div>` : ''}
            <div class="time">${timeStr}</div>
            <div class="h-icon">${wxIcon(h.weather_code[idx], isNight)}</div>
            <div class="h-temp">${Math.round(h.temperature_2m[idx])}°</div>
            <div class="h-feels">feels ${Math.round(h.apparent_temperature[idx])}°</div>
            ${pop > 0 ? `<div class="h-pop">${pop}%</div>` : ''}
          </div>
        `;
      }).join('');

      const hourlyHTML = `<div class="weather-hourly">${hourlyItems}</div>`;

      // Daily
      const dailyHTML = `
        <div class="weather-forecast">
          ${d.time.slice(1, 4).map((day, i) => {
            const dt = new Date(day + 'T12:00:00');
            const pop = d.precipitation_probability_max[i + 1] || 0;
            return `
              <div class="forecast-day">
                <div class="f-name">${WEEKDAYS[dt.getDay()].slice(0, 3).toUpperCase()}</div>
                <div class="f-icon">${wxIcon(d.weather_code[i + 1], false)}</div>
                <div class="f-temps"><strong>${Math.round(d.temperature_2m_max[i + 1])}°</strong> / ${Math.round(d.temperature_2m_min[i + 1])}°</div>
                ${pop > 0 ? `<div class="f-precip">${pop}% precip</div>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      `;

      document.getElementById('weather-card').innerHTML = `
        <div class="card-label">
          St. Adolphe Weather
          <a href="https://www.theweathernetwork.com/en/city/ca/manitoba/st-adolphe/hourly" target="_blank">Full forecast ↗</a>
        </div>
        ${currentHTML}${hourlyHTML}${dailyHTML}
      `;

      // Populate sun card
      document.getElementById('sun-times').innerHTML = `
        <div class="sun-item">
          <span class="sun-icon">🌅</span>
          <div class="sun-info">
            <div class="sun-label">Sunrise</div>
            <div class="sun-time">${sunrise}</div>
          </div>
        </div>
        <div class="sun-item">
          <span class="sun-icon">📸</span>
          <div class="sun-info">
            <div class="sun-label">Golden Hour</div>
            <div class="sun-time">${goldenHour || '--'}</div>
          </div>
        </div>
        <div class="sun-item">
          <span class="sun-icon">🌇</span>
          <div class="sun-info">
            <div class="sun-label">Sunset</div>
            <div class="sun-time">${sunset}</div>
          </div>
        </div>
        <div class="sun-item">
          <span class="sun-icon">⏱️</span>
          <div class="sun-info">
            <div class="sun-label">Daylight</div>
            <div class="sun-time">${d.sunrise && d.sunset ? (() => {
              const diff = new Date(d.sunset[0]) - new Date(d.sunrise[0]);
              const hrs = Math.floor(diff / 3600000);
              const mins = Math.round((diff % 3600000) / 60000);
              return `${hrs}h ${mins}m`;
            })() : '--'}</div>
          </div>
        </div>
      `;

    } catch (e) {
      document.getElementById('weather-current').innerHTML = `
        <div style="color: var(--text-muted); font-size: 14px;">
          Weather unavailable — <a href="https://www.theweathernetwork.com/en/city/ca/manitoba/st-adolphe/current" target="_blank" style="color: var(--accent);">check Weather Network</a>
        </div>
      `;
    }
  }

  loadWeather();

  // ─── NBA Scores (ESPN) ───
  async function loadNBA() {
    const container = document.getElementById('nba-scores');
    const now = new Date();
    const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const toDateStr = d => d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    const yd = new Date(et); yd.setDate(yd.getDate() - 1);
    const base = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard';

    function renderGames(events) {
      return events.map(ev => {
        const comp = ev.competitions[0];
        const st = comp.status.type;
        const isLive = st.state === 'in';
        const isFinal = st.state === 'post';
        const isPre = st.state === 'pre';
        const home = comp.competitors.find(c => c.homeAway === 'home');
        const away = comp.competitors.find(c => c.homeAway === 'away');
        const homeScore = parseInt(home.score) || 0;
        const awayScore = parseInt(away.score) || 0;
        const homeWin = isFinal && homeScore > awayScore;
        const awayWin = isFinal && awayScore > homeScore;
        return `
          <div class="nba-game ${isFinal ? 'final' : ''} ${isLive ? 'live' : ''}">
            <div class="nba-status">${isLive ? '🔴 ' : ''}${st.shortDetail}</div>
            <div class="nba-team">
              <span class="nba-abbr">${away.team.abbreviation}</span>
              <span class="nba-score ${awayWin ? 'win' : ''}">${!isPre ? away.score : ''}</span>
            </div>
            <div class="nba-team">
              <span class="nba-abbr">${home.team.abbreviation}</span>
              <span class="nba-score ${homeWin ? 'win' : ''}">${!isPre ? home.score : ''}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    try {
      const [ydRes, tdRes] = await Promise.all([
        fetch(`${base}?dates=${toDateStr(yd)}`),
        fetch(`${base}?dates=${toDateStr(et)}`)
      ]);
      const ydGames = (await ydRes.json())?.events || [];
      const tdGames = (await tdRes.json())?.events || [];

      if (!ydGames.length && !tdGames.length) {

      let html = '';

        html += `<div class="nba-section-label">${yd.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>`;
        html += `<div class="nba-scores-row">${renderGames(ydGames)}</div>`;
      }
      if (tdGames.length) {
        html += `<div class="nba-section-label"${ydGames.length ? ' style="margin-top:14px"' : ''}>Today — ${et.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>`;
        html += `<div class="nba-scores-row">${renderGames(tdGames)}</div>`;
      }
      container.innerHTML = html;

    } catch (e) {
      container.innerHTML = `<div style="color:var(--text-muted);font-size:14px;">Couldn't load scores — <a href="https://www.espn.com/nba/scoreboard" target="_blank" style="color:var(--accent-soft);text-decoration:none;">check ESPN</a></div>`;
    }
  }
  loadNBA();

  // ─── Crypto Prices ───

  loadCrypto();

  // ─── Real Estate Calendar ───
  const ICAL_URL = 'https://calendar.google.com/calendar/ical/a216e49555e0cffa9e33008c7b4e34ec5c5bb461b34060de74410699cfcf724e%40group.calendar.google.com/private-a55728235cd4181e79404130983008cd/basic.ics';
  const HOME_LAT = 49.6753;
  const HOME_LON = -97.1114;

  function unfoldICalLines(raw) {
    return raw.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
  }

  function parseICalDate(val, tzid) {
    // val can be: 20250315T100000, 20250315T150000Z, or 20250315
    if (!val) return null;
    if (val.includes('T')) {
      const y = +val.slice(0,4), mo = +val.slice(4,6)-1, d = +val.slice(6,8);
      const h = +val.slice(9,11), mi = +val.slice(11,13), s = +val.slice(13,15);
      if (val.endsWith('Z')) return new Date(Date.UTC(y, mo, d, h, mi, s));
      // Has TZID — treat as local timezone for display (we're just showing the time)
      return new Date(y, mo, d, h, mi, s);
    }
    // All-day
    const y = +val.slice(0,4), mo = +val.slice(4,6)-1, d = +val.slice(6,8);
    return new Date(y, mo, d);
  }

  function parseICalEvents(icalText) {
    const lines = unfoldICalLines(icalText).split(/\r?\n/);
    const events = [];
    let current = null;

    for (const line of lines) {
      if (line === 'BEGIN:VEVENT') { current = {}; continue; }
      if (line === 'END:VEVENT') {
        if (current) events.push(current);
        current = null;
        continue;
      }
      if (!current) continue;

      const semi = line.indexOf(';');
      const colon = line.indexOf(':');
      if (colon === -1) continue;

      const rawKey = semi !== -1 && semi < colon ? line.slice(0, semi) : line.slice(0, colon);
      const rawParams = semi !== -1 && semi < colon ? line.slice(semi+1, colon) : '';
      const val = line.slice(colon+1);

      const key = rawKey.toUpperCase();
      if (key === 'SUMMARY') current.title = val.replace(/\\,/g, ',').replace(/\\n/g, '\n').trim();
      if (key === 'DESCRIPTION') current.description = val.replace(/\\,/g, ',').replace(/\\n/g, '\n').trim();
      if (key === 'LOCATION') current.location = val.replace(/\\,/g, ',').trim();
      if (key === 'DTSTART' || key === 'DTSTART') {
        const tzidMatch = rawParams.match(/TZID=([^;:]+)/i);
        const tzid = tzidMatch ? tzidMatch[1] : null;
        current.start = parseICalDate(val, tzid);
        current.allDay = !val.includes('T');
      }
      if (key === 'DTEND') {
        const tzidMatch = rawParams.match(/TZID=([^;:]+)/i);
        current.end = parseICalDate(val, tzidMatch ? tzidMatch[1] : null);
      }
      if (key === 'UID') current.uid = val;
    }
    return events;
  }

  async function geocodeAddress(address) {
    if (!address) return null;
    try {
      const encoded = encodeURIComponent(address);
      const url = `https://nominatim.openstreetmap.org/search?q=${encoded}&format=json&limit=1&countrycodes=ca`;
      const res = await fetch(url, { headers: { 'User-Agent': 'ChrisNgoDashboard/1.0' } });
      const data = await res.json();
      if (data && data[0]) return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
      return null;
    } catch (e) { return null; }
  }

  async function getDriveInfo(destLat, destLon) {
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${HOME_LON},${HOME_LAT};${destLon},${destLat}?overview=false`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.code === 'Ok' && data.routes[0]) {
        const route = data.routes[0];
        const mins = Math.round(route.duration / 60);
        const km = (route.distance / 1000).toFixed(1);
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        const timeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
        return { time: timeStr, km };
      }
      return null;
    } catch (e) { return null; }
  }

  function weekLabel(evDate, todayStart) {
    const evDay = new Date(evDate.getFullYear(), evDate.getMonth(), evDate.getDate());
    const diffDays = Math.round((evDay - todayStart) / 86400000);
    const dayOfWeek = todayStart.getDay(); // 0=Sun
    const daysUntilEndOfWeek = 6 - dayOfWeek;
    if (diffDays === 0) return 'Today';
    if (diffDays <= daysUntilEndOfWeek) return 'This Week';
    if (diffDays <= daysUntilEndOfWeek + 7) return 'Next Week';
    return evDate.toLocaleDateString('en-US', { month: 'long' });
  }

  function shootItemHTML(event, driveInfo) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const evDate = event.start;
    const evDay = new Date(evDate.getFullYear(), evDate.getMonth(), evDate.getDate());
    const isToday = evDay.getTime() === todayStart.getTime();

    const dayNum = String(evDate.getDate()).padStart(2, '0');
    const monthStr = evDate.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
    const dowStr = evDate.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();

    const timeStr = event.allDay
      ? 'All day'
      : evDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

    const loc = event.location || '';
    // Strip country/province suffixes for brevity: keep street + city
    const locShort = loc.split(',').slice(0, 2).join(',').trim();
    const mapsQuery = encodeURIComponent(loc || event.title);
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${HOME_LAT},${HOME_LON}&destination=${mapsQuery}`;

    let rightHTML = '';
    if (driveInfo) {
      rightHTML = `
        <div class="shoot-right">
          <div class="shoot-drive-pill">
            <span class="shoot-drive-time">${driveInfo.time}</span>
            <span class="shoot-drive-dist">· ${driveInfo.km} km</span>
          </div>
          ${loc ? `<a href="${mapsUrl}" target="_blank" class="shoot-map-btn" title="Directions">↗</a>` : ''}
        </div>`;
    } else if (loc) {
      rightHTML = `
        <div class="shoot-right">
          <span class="shoot-drive-dots">···</span>
          <a href="${mapsUrl}" target="_blank" class="shoot-map-btn" title="Directions">↗</a>
        </div>`;
    } else {
      rightHTML = `<div class="shoot-right"></div>`;
    }

    return `
      <div class="shoot-item${isToday ? ' shoot-today' : ''}" data-uid="${event.uid || ''}">
        <div class="shoot-date">
          <div class="shoot-date-top">${dayNum} ${monthStr}</div>
          <div class="shoot-date-dow">${dowStr}</div>
          ${isToday ? '<span class="shoot-today-tag">TODAY</span>' : ''}
        </div>
        <div class="shoot-info">
          <div class="shoot-title">${event.title || 'Shoot'}</div>
          <div class="shoot-meta">
            <span class="shoot-time-badge">${timeStr}</span>
            ${loc ? `<span class="shoot-meta-sep">·</span><span class="shoot-loc-text">📍 ${locShort}</span>` : ''}
          </div>
        </div>
        ${rightHTML}
      </div>`;
  }

  function renderShootList(upcoming, todayStart) {
    let html = '<div class="shoot-list">';
    let lastLabel = null;
    upcoming.forEach(ev => {
      const label = weekLabel(ev.start, todayStart);
      if (label !== lastLabel) {
        html += `<div class="shoot-week-label">${label}</div>`;
        lastLabel = label;
      }
      html += shootItemHTML(ev, null);
    });
    html += '</div>';
    return html;
  }

  async function loadCalendar() {
    const container = document.getElementById('calendar-content');
    // IMPORTANT: do NOT use encodeURIComponent on ICAL_URL — it already contains
    // %40 (encoded @). Double-encoding it to %2540 breaks the Google Calendar request.
    const proxies = [
      `https://api.codetabs.com/v1/proxy?quest=${ICAL_URL}`,
      `https://api.allorigins.win/raw?url=${ICAL_URL}`,
      `https://corsproxy.io/?url=${ICAL_URL}`,
    ];

    let icalText = null;
    for (const proxyUrl of proxies) {
      try {
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
        if (res.ok) {
          const text = await res.text();
          if (text.includes('VCALENDAR')) { icalText = text; break; }
        }
      } catch (e) {}
    }

    if (!icalText) {
      container.innerHTML = `<div style="color:var(--text-muted);font-size:14px;">Couldn't load calendar — <a href="https://calendar.google.com" target="_blank" style="color:var(--accent-soft);text-decoration:none;">open Google Calendar ↗</a></div>`;
      return;
    }

    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const in60days = new Date(todayStart.getTime() + 60 * 24 * 60 * 60 * 1000);

    const allEvents = parseICalEvents(icalText);
    const upcoming = allEvents
      .filter(ev => ev.start && ev.start >= todayStart && ev.start <= in60days)
      .sort((a, b) => a.start - b.start)
      .slice(0, 12);

    if (!upcoming.length) {
      container.innerHTML = `<div style="color:var(--text-muted);font-size:14px;">No upcoming shoots in the next 60 days.</div>`;
      return;
    }

    // Render immediately with placeholder drive dots
    container.innerHTML = renderShootList(upcoming, todayStart);

    // Progressively fill in drive times (Nominatim: 1 req/sec)
    for (let i = 0; i < upcoming.length; i++) {
      const ev = upcoming[i];
      if (!ev.location) continue;
      await new Promise(r => setTimeout(r, i === 0 ? 0 : 1100));
      const geo = await geocodeAddress(ev.location);
      if (!geo) continue;
      const drive = await getDriveInfo(geo.lat, geo.lon);
      if (!drive) continue;
      // Find and update this item's right column
      const items = container.querySelectorAll('.shoot-item');
      if (items[i]) {
        const rightEl = items[i].querySelector('.shoot-right');
        const loc = ev.location || '';
        const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${HOME_LAT},${HOME_LON}&destination=${encodeURIComponent(loc)}`;
        if (rightEl) rightEl.outerHTML = `
          <div class="shoot-right">
            <div class="shoot-drive-pill">
              <span class="shoot-drive-time">${drive.time}</span>
              <span class="shoot-drive-dist">· ${drive.km} km</span>
            </div>
            <a href="${mapsUrl}" target="_blank" class="shoot-map-btn" title="Directions">↗</a>
          </div>`;
      }
    }
  }
  loadCalendar();
</script>
